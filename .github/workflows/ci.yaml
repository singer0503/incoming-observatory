name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (offline test deps)
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Tests (offline — uses committed snapshots, no network)
        run: pytest -q
      - name: Ledger smoke run
        run: |
          incoming ledger
          incoming recompute   # offline, against committed data/mpc_first_obs.json
